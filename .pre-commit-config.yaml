repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: diffaudit-local-checks
        name: diffaudit-local-checks
        entry: python scripts/util/run_local_checks.py --fast
        language: system
        pass_filenames: false

      - id: no-dated-filenames
        name: Reject new files with YYYYMMDD in filename
        description: >
          New files should not contain YYYYMMDD date strings in their names.
          Use semantic kebab-case names. Dates belong in file frontmatter
          or content, not filenames.
        entry: python scripts/util/_hook_no_dated_filenames.py
        language: python
        files: ''
        types: [file]
        stages: [commit]

      - id: no-root-scripts
        name: Reject new .py files directly in scripts/ root
        description: >
          Python scripts must be placed in a subdirectory of scripts/
          (e.g., scripts/h1/, scripts/util/). No new .py files in scripts/ root.
        entry: python scripts/util/_hook_no_root_scripts.py
        language: python
        files: '^scripts/[^/]+\.py$'
        types: [file]
        stages: [commit]

      - id: evidence-md-headers
        name: Require Date/Status/Verdict headers in new evidence docs
        description: >
          New .md files in docs/evidence/ must include Date, Status, and Verdict
          headers as top-level markdown fields.
        entry: python scripts/util/_hook_evidence_md_headers.py
        language: python
        files: '^docs/evidence/.*\.md$'
        types: [file]
        stages: [commit]

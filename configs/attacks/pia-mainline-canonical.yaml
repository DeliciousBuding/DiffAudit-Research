task:
  name: pia-mainline-canonical
  model_family: diffusion
  access_level: semi_white_box
assets:
  dataset_id: pia-cifar10-canonical
  dataset_name: cifar10
  dataset_root: workspaces/gray-box/assets/pia/datasets
  model_id: pia-cifar10-ddpm-canonical
  model_dir: workspaces/gray-box/assets/pia/checkpoints/cifar10_ddpm
attack:
  method: pia
  num_samples: 128
  parameters:
    variant: canonical-ddpm-eq9
    attacker_name: PIA
    timestep: 200
    lp_order: 4
    score_form: negative_residual_norm
    score_direction: higher_is_member
    input_range: [-1.0, 1.0]
    query_timesteps: [0, 200]
    query_count: 2
    normalization: per_row_vector_lp
    beta_semantics: linear_1000_steps_inclusive_0.0001_to_0.02
    threshold_calibration: maximize_balanced_accuracy_then_minimize_fpr_then_highest_threshold
    positive_control_gate:
      auc_min: 0.95
      balanced_accuracy_min: 0.90
      fpr_max: 0.05
    batch_size: 8
report:
  output_dir: workspaces/gray-box/runs

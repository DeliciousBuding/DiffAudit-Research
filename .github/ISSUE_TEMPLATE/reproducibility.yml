name: Reproducibility issue
description: Report a setup, asset, command, or reproduction blocker.
title: "[repro]: "
labels:
  - "reproducibility"
body:
  - type: markdown
    attributes:
      value: |
        Use this for reproducibility blockers. Do not paste private paths, credentials, gated asset links, or proprietary weights.
  - type: dropdown
    id: lane
    attributes:
      label: Lane
      options:
        - black-box
        - gray-box
        - white-box
        - cross-box
        - environment
        - data-assets
        - docs
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or setup step
      description: Paste the exact command or setup step that failed, with secrets removed.
      render: powershell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Include the shortest useful error output, with local secrets and private paths removed.
      render: text
    validations:
      required: true
  - type: textarea
    id: assets
    attributes:
      label: Asset readiness
      description: Which datasets, weights, or supplementary bundles are present? Use portable names, not private absolute paths.
      placeholder: "Example: Download/shared/datasets/cifar-10-python.tar.gz is present; stable-diffusion-v1-5 is missing."
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I checked docs/teammate-setup.md.
        - label: I checked docs/data-and-assets-handoff.md.
        - label: I checked docs/reproduction-status.md.

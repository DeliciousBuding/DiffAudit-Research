name: Weekly Docs Governance Check

on:
  schedule:
    - cron: '7 3 * * 1'  # Every Monday at 03:07 UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Run docs governance checks
        id: docs-check
        run: python scripts/util/run_docs_checks.py
        continue-on-error: true

      - name: Check for stale governance docs
        id: stale-check
        run: |
          STALE=$(python scripts/util/run_docs_checks.py --list-stale 2>/dev/null || echo "")
          if [ -n "$STALE" ]; then
            echo "stale_found=true" >> $GITHUB_OUTPUT
            echo "stale_list<<EOF" >> $GITHUB_OUTPUT
            echo "$STALE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "stale_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Create issue for stale docs
        if: steps.stale-check.outputs.stale_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const staleList = `${{ steps.stale-check.outputs.stale_list }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Stale governance docs detected',
              body: `## Stale Governance Documents\n\nThe following docs have not been updated in over 30 days and may need review:\n\n${staleList}\n\nRun \`python scripts/util/run_docs_checks.py\` locally for details.`,
              labels: ['documentation', 'stale']
            });

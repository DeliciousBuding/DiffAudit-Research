name: Weekly Docs Governance Check

on:
  schedule:
    - cron: '7 3 * * 1'  # Every Monday at 03:07 UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Run docs governance checks
        run: python scripts/util/run_docs_checks.py

name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh -l {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Conda Environment
        uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: diffaudit-research
          environment-file: environment.yml
          auto-activate: false
          miniforge-version: latest
          use-mamba: true

      - name: Public Surface Guard
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          python scripts/check_public_surface.py
          python scripts/check_markdown_links.py
          python scripts/validate_attack_defense_table.py
          python scripts/export_recon_product_evidence_card.py --check

      - name: Verify CLI Install
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          python scripts/bootstrap_research_env.py
          python -m diffaudit --help
          diffaudit --help
          python scripts/verify_env.py

      - name: Render Local Config Templates
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          python scripts/render_team_local_configs.py --team-local configs/assets/team.local.template.yaml --output-dir tmp/configs/rendered-ci

      - name: Run Core Tests
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          python -m unittest tests.test_attack_registry tests.test_smoke_pipeline tests.test_audit_variation_query_contract
          python -m pytest tests/test_variation_attack.py tests/test_render_team_local_configs.py -q

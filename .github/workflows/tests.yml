name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh -l {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Classify Change Set
        id: changes
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          if ("${{ github.event_name }}" -ne "pull_request") {
            $changed = git diff --name-only HEAD~1 HEAD
            if (-not $changed) {
              $changed = @()
            }
            $forceFull = $true
          } else {
            $base = "${{ github.event.pull_request.base.sha }}"
            $changed = git diff --name-only $base HEAD
            if (-not $changed) {
              $changed = @()
            }

            $fullPatterns = @(
              '^src/',
              '^scripts/',
              '^tests/',
              '^tools/',
              '^configs/',
              '^environment\.yml$',
              '^pyproject\.toml$',
              '^pytest\.ini$',
              '^setup\.cfg$',
              '^\.github/workflows/'
            )
            $forceFull = $false
            foreach ($path in $changed) {
              $normalized = $path -replace '\\', '/'
              foreach ($pattern in $fullPatterns) {
                if ($normalized -match $pattern) {
                  $forceFull = $true
                  break
                }
              }
              if ($forceFull) {
                break
              }
            }
          }

          "changed_files<<EOF" >> $env:GITHUB_OUTPUT
          ($changed -join "`n") >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT
          "full=$($forceFull.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Lightweight Documentation Guards
        if: steps.changes.outputs.full != 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          python scripts/run_docs_checks.py

      - name: Setup Conda Environment
        if: steps.changes.outputs.full == 'true'
        uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: diffaudit-research
          environment-file: environment.yml
          auto-activate: false
          miniforge-version: latest
          use-mamba: true

      - name: Public Surface Guard
        if: steps.changes.outputs.full == 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          python scripts/run_docs_checks.py

      - name: Verify CLI Install
        if: steps.changes.outputs.full == 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          python scripts/bootstrap_research_env.py
          python -m diffaudit --help
          diffaudit --help
          python scripts/verify_env.py

      - name: Render Local Config Templates
        if: steps.changes.outputs.full == 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          python scripts/render_team_local_configs.py --team-local configs/assets/team.local.template.yaml --output-dir tmp/configs/rendered-ci

      - name: Run Core Tests
        if: steps.changes.outputs.full == 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          python -m unittest tests.test_attack_registry tests.test_smoke_pipeline tests.test_audit_variation_query_contract tests.test_review_semantic_aux_low_fpr tests.test_review_recon_tail_confidence
          python -m pytest tests/test_variation_attack.py tests/test_render_team_local_configs.py -q

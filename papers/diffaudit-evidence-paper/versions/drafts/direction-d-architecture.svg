<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Direction D artifact contract architecture</title>
  <desc id="desc">DiffAudit artifact/demo report-correctness flow from research evidence notes to an admitted bundle, selected static checks, a risk-card renderer, and a public-safe risk card.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="dasharrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 26px Georgia, serif; fill: #0f172a; }
      .subtitle { font: 15px Georgia, serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 18; }
      .soft { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 18; }
      .guard { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 18; }
      .public { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 18; }
      .label { font: 700 16px Georgia, serif; fill: #0f172a; }
      .body { font: 14px Georgia, serif; fill: #334155; }
      .small { font: 12px Georgia, serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.2; fill: none; stroke-dasharray: 8 7; marker-end: url(#dasharrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="620"/>
  <text class="title" x="56" y="54">Direction D: Artifact Contract and Report-Correctness Flow</text>
  <text class="subtitle" x="56" y="82">Selected static checks generate an admitted-only report surface; A/B drift, external use, and deployment telemetry are not evaluated.</text>

  <rect class="box" x="56" y="140" width="230" height="118"/>
  <text class="label" x="78" y="172">Research evidence</text>
  <text class="body" x="78" y="201">Evidence notes</text>
  <text class="body" x="78" y="223">Score arrays</text>
  <text class="body" x="78" y="245">Response packets and point sources</text>

  <rect class="soft" x="56" y="356" width="230" height="118"/>
  <text class="label" x="78" y="388">Research-only ledger</text>
  <text class="body" x="78" y="417">claim_register.md</text>
  <text class="body" x="78" y="439">source_map.md</text>
  <text class="small" x="78" y="462">candidate / support / negative rows</text>

  <rect class="box" x="380" y="140" width="260" height="118"/>
  <text class="label" x="402" y="172">Admitted evidence bundle</text>
  <text class="body" x="402" y="201">status = admitted-only</text>
  <text class="body" x="402" y="223">row_count = 5</text>
  <text class="small" x="402" y="246">replay/source tiers retained</text>

  <rect class="guard" x="380" y="356" width="260" height="118"/>
  <text class="label" x="402" y="388">Selected static checks</text>
  <text class="body" x="402" y="417">row count and source provenance</text>
  <text class="body" x="402" y="439">finite-tail denominators</text>
  <text class="small" x="402" y="462">public-surface guard passes</text>

  <rect class="guard" x="734" y="140" width="260" height="118"/>
  <text class="label" x="756" y="172">Risk-card renderer</text>
  <text class="body" x="756" y="201">report-facing tiers</text>
  <text class="body" x="756" y="223">finite-tail caveats</text>
  <text class="small" x="756" y="246">candidate replacement exits 2</text>

  <rect class="public" x="734" y="356" width="260" height="118"/>
  <text class="label" x="756" y="388">Public-safe risk card</text>
  <text class="body" x="756" y="417">five role-separated rows</text>
  <text class="body" x="756" y="439">no private topology</text>
  <text class="small" x="756" y="462">not a leaderboard</text>

  <path class="arrow" d="M 286 199 H 380"/>
  <path class="arrow" d="M 640 199 H 734"/>
  <path class="arrow" d="M 864 258 V 356"/>
  <path class="arrow" d="M 510 258 V 356"/>
  <path class="arrow" d="M 640 415 C 690 415 688 223 734 223"/>
  <path class="dash" d="M 286 415 H 380"/>
  <path class="dash" d="M 171 356 V 258"/>

  <text class="small" x="300" y="184">admitted rows only</text>
  <text class="small" x="664" y="184">checked bundle</text>
  <text class="small" x="876" y="314">generated report</text>
  <text class="small" x="300" y="402">blocked from card</text>
  <text class="small" x="526" y="333">fault injection</text>

  <rect class="soft" x="56" y="534" width="938" height="42"/>
  <text class="small" x="78" y="560">Allowed Direction D claim: generated artifact/demo report boundary plus selected observed blocking. Future systems evidence not evaluated: A/B report drift, external use, deployment telemetry.</text>
</svg>

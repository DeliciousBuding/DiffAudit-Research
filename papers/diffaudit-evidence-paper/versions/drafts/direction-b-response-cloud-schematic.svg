<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="Direction B response-cloud geometry schematic">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9f2d2d"/>
    </marker>
    <style>
      .title { font: 700 21px Georgia, serif; fill: #172033; }
      .label { font: 600 13px Georgia, serif; fill: #172033; }
      .small { font: 12px Georgia, serif; fill: #334155; }
      .tiny { font: 10.5px Georgia, serif; fill: #475569; }
      .box { fill: #f7fafc; stroke: #243244; stroke-width: 1.4; rx: 12; }
      .blue { fill: #e7f0fb; stroke: #315d9c; }
      .amber { fill: #fff1d7; stroke: #b67818; }
      .green { fill: #e8f4e8; stroke: #41764a; }
      .red { fill: #f8e3e1; stroke: #9f2d2d; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .line-red { stroke: #9f2d2d; stroke-width: 2; fill: none; marker-end: url(#arrow-red); }
      .cloud-a { fill: #3b6ea8; opacity: 0.82; }
      .cloud-b { fill: #d9922f; opacity: 0.82; }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="360" fill="#ffffff"/>
  <text x="460" y="34" text-anchor="middle" class="title">Direction B: H2 Response-Cloud Observable and Portability Boundary</text>

  <rect x="38" y="78" width="140" height="110" class="box blue"/>
  <text x="108" y="105" text-anchor="middle" class="label">Frozen H2 cache</text>
  <text x="108" y="130" text-anchor="middle" class="small">member/nonmember</text>
  <text x="108" y="148" text-anchor="middle" class="small">512 / 512 rows</text>
  <text x="108" y="168" text-anchor="middle" class="tiny">fixed target and labels</text>

  <path d="M184 133 C220 133, 234 133, 260 133" class="line"/>

  <rect x="270" y="68" width="200" height="130" class="box"/>
  <text x="370" y="96" text-anchor="middle" class="label">Repeated responses</text>
  <text x="370" y="115" text-anchor="middle" class="tiny">timesteps 40 / 80 / 120 / 160</text>
  <circle cx="318" cy="150" r="7" class="cloud-a"/>
  <circle cx="338" cy="133" r="6" class="cloud-a"/>
  <circle cx="354" cy="157" r="5" class="cloud-a"/>
  <circle cx="376" cy="139" r="7" class="cloud-a"/>
  <circle cx="395" cy="160" r="6" class="cloud-a"/>
  <circle cx="424" cy="132" r="6" class="cloud-a"/>
  <circle cx="322" cy="174" r="6" class="cloud-b"/>
  <circle cx="346" cy="186" r="5" class="cloud-b"/>
  <circle cx="367" cy="171" r="7" class="cloud-b"/>
  <circle cx="394" cy="185" r="6" class="cloud-b"/>
  <circle cx="418" cy="169" r="5" class="cloud-b"/>
  <text x="370" y="214" text-anchor="middle" class="tiny">response cloud, not isolated outputs</text>

  <path d="M476 133 C506 133, 518 133, 544 133" class="line"/>

  <rect x="555" y="70" width="160" height="126" class="box amber"/>
  <text x="635" y="98" text-anchor="middle" class="label">Output-output geometry</text>
  <text x="635" y="122" text-anchor="middle" class="small">repeat RMSE</text>
  <text x="635" y="141" text-anchor="middle" class="small">centroid motion</text>
  <text x="635" y="160" text-anchor="middle" class="small">PCA / Gram spectra</text>
  <text x="635" y="181" text-anchor="middle" class="tiny">excludes query-output distance</text>

  <path d="M720 133 C750 133, 760 133, 786 133" class="line"/>

  <rect x="795" y="80" width="98" height="106" class="box green"/>
  <text x="844" y="106" text-anchor="middle" class="label">Candidate</text>
  <text x="844" y="126" text-anchor="middle" class="small">AUC 0.9615</text>
  <text x="844" y="146" text-anchor="middle" class="small">TPR1 0.3340</text>
  <text x="844" y="166" text-anchor="middle" class="tiny">H2-family only</text>

  <rect x="78" y="250" width="205" height="68" class="box green"/>
  <text x="180" y="276" text-anchor="middle" class="label">Controls preserve boundary</text>
  <text x="180" y="298" text-anchor="middle" class="tiny">label shuffle random; seed and cache checks same-family only</text>

  <rect x="360" y="242" width="205" height="84" class="box red"/>
  <text x="462" y="270" text-anchor="middle" class="label">Img2img portability gate fails</text>
  <text x="462" y="293" text-anchor="middle" class="small">SD/CelebA 25 / 25</text>
  <text x="462" y="312" text-anchor="middle" class="small">AUC 0.7888; strict tail 0</text>

  <rect x="642" y="250" width="205" height="68" class="box red"/>
  <text x="744" y="276" text-anchor="middle" class="label">No admitted claim</text>
  <text x="744" y="298" text-anchor="middle" class="tiny">no product row, no cross-model portability, no general attack</text>

  <path d="M844 190 C844 232, 820 242, 778 252" class="line-red"/>
  <path d="M565 284 C594 284, 610 284, 636 284" class="line-red"/>
  <path d="M284 284 C312 284, 329 284, 354 284" class="line"/>

  <text x="460" y="342" text-anchor="middle" class="tiny">Scientific object: positive H2-family response-cloud observable plus a negative portability/admission boundary.</text>
</svg>
